services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DIRECTUS_DB_DATABASE:-directus}
      POSTGRES_USER: ${DIRECTUS_DB_USER:-directus}
      POSTGRES_PASSWORD: ${DIRECTUS_DB_PASSWORD:-change-me}
    volumes:
      - directus_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DIRECTUS_DB_USER:-directus} -d ${DIRECTUS_DB_DATABASE:-directus}"]
      interval: 10s
      timeout: 5s
      retries: 5

  directus:
    image: directus/directus:11.5.1
    restart: unless-stopped
    ports:
      - "${DIRECTUS_PORT:-8055}:8055"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      KEY: ${DIRECTUS_KEY:-replace-with-random-key}
      SECRET: ${DIRECTUS_SECRET:-replace-with-random-secret}
      ADMIN_EMAIL: ${DIRECTUS_ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${DIRECTUS_ADMIN_PASSWORD:-change-me}
      PUBLIC_URL: ${DIRECTUS_PUBLIC_URL:-http://localhost:8055}
      DB_CLIENT: pg
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DIRECTUS_DB_DATABASE:-directus}
      DB_USER: ${DIRECTUS_DB_USER:-directus}
      DB_PASSWORD: ${DIRECTUS_DB_PASSWORD:-change-me}
      CORS_ENABLED: "true"
      CORS_ORIGIN: ${DIRECTUS_CORS_ORIGIN:-http://localhost:3000,http://localhost:3010}
      TELEMETRY: "false"
    volumes:
      - ./directus:/directus
      - directus_uploads:/directus/uploads
      - directus_extensions:/directus/extensions

volumes:
  directus_postgres_data:
  directus_uploads:
  directus_extensions:
